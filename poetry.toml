[virtualenvs]
in-project = true

[solver]
# Set min-release-age to 2 weeks, same as in https://github.com/ni/python-renovate-config
min-release-age = 14
min-release-age-exclude = [
    "jupyter-server",
    "ni-python-styleguide",
    "ni-measurements-data-v1-client",
    "ni-measurements-data-v1-proto",
    "ni-protobuf-types",
    "nitypes"
]